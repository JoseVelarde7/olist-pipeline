version: '3.8'

# Configuracion compartida entre todos los servicios de Airflow
x-airflow-common:
  &airflow-common
  image: apache/airflow:2.9.0
  environment:
    &airflow-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-postgres:5432/airflow
    AIRFLOW__CORE__FERNET_KEY: 'ZmDfcTF7_60GrrY167zsiPd67pEvs0aGOv2oasOM1Pg='
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'true'
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    AIRFLOW__WEBSERVER__EXPOSE_CONFIG: 'true'
    AIRFLOW__WEBSERVER__SECRET_KEY: 'olist_sprint2_secret'
    # Olist DB — host.docker.internal resuelve a la maquina host desde dentro de Docker
    # Esto permite que Airflow se conecte al MariaDB local ya existente con los datos
    OLIST_DB_HOST: ${OLIST_DB_HOST:-host.docker.internal}
    OLIST_DB_PORT: ${OLIST_DB_PORT:-3306}
    OLIST_DB_USER: ${OLIST_DB_USER}
    OLIST_DB_PASSWORD: ${OLIST_DB_PASSWORD}
    OLIST_DB_NAME: ${OLIST_DB_NAME:-olist}
    # MLflow — URL interna de la red Docker
    MLFLOW_TRACKING_URI: http://mlflow:5000
    PYTHONPATH: /opt/airflow
    _PIP_ADDITIONAL_REQUIREMENTS: "polars duckdb lightgbm statsmodels numpy<2 mlflow==2.20.0 optuna"
  volumes:
    - ./dags:/opt/airflow/dags
    - ./src:/opt/airflow/src
    - ./data:/opt/airflow/data
    - ./config:/opt/airflow/config
    - ./models:/opt/airflow/models
    - ./reports:/opt/airflow/reports
    - ./logs/airflow:/opt/airflow/logs
  depends_on:
    &airflow-depends-on
    airflow-postgres:
      condition: service_healthy

services:

  # --------------------------------------------------------------------------
  # PostgreSQL — base de datos de metadatos de Airflow (no del proyecto)
  # --------------------------------------------------------------------------
  airflow-postgres:
    image: postgres:15
    container_name: olist_airflow_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - airflow_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 5s
      timeout: 5s
      retries: 10

  # --------------------------------------------------------------------------
  # Airflow Init — se ejecuta una sola vez para inicializar la BD y crear admin
  # --------------------------------------------------------------------------
  airflow-init:
    <<: *airflow-common
    container_name: olist_airflow_init
    command: bash -c "airflow db init && airflow users create --username admin --firstname Admin --lastname Olist --role Admin --email pepevelarde7@gmail.com --password admin123"
    depends_on:
      <<: *airflow-depends-on

  # --------------------------------------------------------------------------
  # Airflow Webserver — UI disponible en http://localhost:8080
  # Usuario: admin | Contrasena: admin123
  # --------------------------------------------------------------------------
  airflow-webserver:
    <<: *airflow-common
    container_name: olist_airflow_webserver
    restart: unless-stopped
    command: webserver
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    depends_on:
      <<: *airflow-depends-on
      airflow-init:
        condition: service_completed_successfully

  # --------------------------------------------------------------------------
  # Airflow Scheduler — ejecuta las tareas del DAG
  # --------------------------------------------------------------------------
  airflow-scheduler:
    <<: *airflow-common
    container_name: olist_airflow_scheduler
    restart: unless-stopped
    command: scheduler
    depends_on:
      <<: *airflow-depends-on
      airflow-init:
        condition: service_completed_successfully

  # --------------------------------------------------------------------------
  # MLflow — tracking server disponible en http://localhost:5000
  # Construido desde Dockerfile.mlflow para evitar pip install en cada arranque
  # --------------------------------------------------------------------------
  mlflow:
    build:
      context: .
      dockerfile: Dockerfile.mlflow
    container_name: olist_mlflow
    restart: unless-stopped
    ports:
      - "5000:5000"
    volumes:
      - mlflow_data:/mlflow

  # --------------------------------------------------------------------------
  # Streamlit Dashboard — disponible en http://localhost:8501
  # Lee reports/metrics/ en tiempo real; se auto-refresca cada 60 s.
  # El código se monta desde src/dashboard/ para editar sin rebuild.
  # --------------------------------------------------------------------------
  streamlit:
    build:
      context: .
      dockerfile: Dockerfile.streamlit
    container_name: olist_dashboard
    restart: unless-stopped
    ports:
      - "8501:8501"
    volumes:
      - ./src/dashboard:/app
      - ./reports:/app/reports
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    depends_on:
      airflow-init:
        condition: service_completed_successfully

volumes:
  airflow_postgres_data:
  mlflow_data:
